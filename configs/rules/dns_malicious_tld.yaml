name: "DNS_MALICIOUS_TLD"
description: "DNS query to known malicious or suspicious top-level domains"
severity: "HIGH"
event_type: "DNS"
logic: "or"
conditions:
  - field: "name"
    operator: "contains"
    value: ".top."
  - field: "name"
    operator: "contains"
    value: ".buzz."
  - field: "name"
    operator: "contains"
    value: ".tk."
  - field: "name"
    operator: "contains"
    value: ".xyz."
  - field: "name"
    operator: "contains"
    value: ".onion."
