name: "PROXY_SUSPICIOUS_AGENT"
description: "Proxy traffic with suspicious user-agent or tool signature"
severity: "MEDIUM"
event_type: "PROXY"
logic: "or"
conditions:
  - field: "user_agent"
    operator: "contains"
    value: "sqlmap"
  - field: "user_agent"
    operator: "contains"
    value: "nikto"
  - field: "user_agent"
    operator: "contains"
    value: "nmap"
  - field: "user_agent"
    operator: "contains"
    value: "masscan"
  - field: "path"
    operator: "contains"
    value: "../"
