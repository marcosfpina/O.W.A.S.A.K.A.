name: "VM_ESCAPE_INDICATOR"
description: "VM event with privilege escalation or escape indicators"
severity: "CRITICAL"
event_type: "VM"
logic: "or"
conditions:
  - field: "privileged"
    operator: "equals"
    value: "true"
  - field: "capabilities"
    operator: "contains"
    value: "SYS_ADMIN"
  - field: "capabilities"
    operator: "contains"
    value: "NET_RAW"
