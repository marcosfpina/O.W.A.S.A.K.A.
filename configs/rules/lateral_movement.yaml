name: "LATERAL_MOVEMENT"
description: "Port scanning targeting internal RFC1918 address ranges"
severity: "HIGH"
event_type: "PORT_SCAN"
logic: "or"
conditions:
  - field: "destination"
    operator: "contains"
    value: "192.168."
  - field: "destination"
    operator: "contains"
    value: "10."
  - field: "destination"
    operator: "contains"
    value: "172.16."
